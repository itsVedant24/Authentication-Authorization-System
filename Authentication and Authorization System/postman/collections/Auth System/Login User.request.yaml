$kind: http-request
name: Login User
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "Test@1234"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test 1: Status code is 200
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      // Test 2: Response is a non-empty JWT token
      pm.test("Response is a non-empty JWT token", function () {
        const token = pm.response.text();
        pm.expect(token).to.be.a("string").and.to.have.length.above(10);
        // JWT tokens have 3 parts separated by dots
        pm.expect(token.split(".").length).to.equal(3);
      });

      // Test 3: Save token to environment for reuse
      pm.test("JWT token saved to environment", function () {
        const token = pm.response.text();
        pm.environment.set("authToken", token);
        pm.expect(pm.environment.get("authToken")).to.equal(token);
      });

      // Test 4: Response time is acceptable
      pm.test("Response time is less than 2000ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
