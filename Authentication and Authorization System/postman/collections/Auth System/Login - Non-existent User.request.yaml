$kind: http-request
name: 'Login - Non-existent User'
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "nobody@example.com",
      "password": "SomePassword1"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test 1: Should NOT return 200 for non-existent user
      pm.test("Status code is not 200 (user does not exist)", function () {
        pm.expect(pm.response.code).to.not.equal(200);
      });

      // Test 2: Response should indicate an error
      pm.test("Response indicates user not found", function () {
        const isErrorStatus = pm.response.code >= 400 && pm.response.code < 600;
        pm.expect(isErrorStatus).to.be.true;
      });
