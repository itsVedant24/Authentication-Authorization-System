$kind: http-request
name: 'Login - Wrong Password'
method: POST
url: '{{baseUrl}}/api/auth/login'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "testuser@example.com",
      "password": "WrongPassword!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test 1: Should NOT return 200 for wrong password
      pm.test("Status code is not 200 (login should fail)", function () {
        pm.expect(pm.response.code).to.not.equal(200);
      });

      // Test 2: Response should indicate an error
      pm.test("Response indicates authentication failure", function () {
        // Server returns 500 for RuntimeException("Invalid Password") — check body or status
        const body = pm.response.text();
        const isErrorStatus = pm.response.code >= 400 && pm.response.code < 600;
        const hasErrorMessage = body.toLowerCase().includes("invalid") || body.toLowerCase().includes("password") || body.toLowerCase().includes("error");
        pm.expect(isErrorStatus || hasErrorMessage).to.be.true;
      });
