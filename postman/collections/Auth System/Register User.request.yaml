$kind: http-request
name: Register User
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Test User",
      "email": "testuser@example.com",
      "password": "Test@1234"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // Test 1: Status code is 200
      pm.test("Status code is 200", function () {
        pm.response.to.have.status(200);
      });

      // Test 2: Response body confirms registration
      pm.test("Response confirms user registered", function () {
        pm.expect(pm.response.text()).to.include("User Registered Successfully");
      });

      // Test 3: Response time is acceptable
      pm.test("Response time is less than 2000ms", function () {
        pm.expect(pm.response.responseTime).to.be.below(2000);
      });
